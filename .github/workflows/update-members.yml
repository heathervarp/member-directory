name: Update Member Directory

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Manual trigger for on-demand refresh

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Fetch members from Wild Apricot
        env:
          WA_API_KEY: ${{ secrets.WA_API_KEY }}
        run: node scripts/fetch-members.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add members.json geocode-cache.json
          git diff --staged --quiet || git commit -m "Update member directory data"
          git push
